<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> SlickWeb - Azlan Ali Khan's Site </title>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" type="text/css" href="styles/main.css">
</head>

<body>

  <div class="htmx-indicator" id="loader"></div>

  <nav>
    <span class="nav-brand">SLICK USER</span>
    <ul class="nav-links">
      <li><a href="/" hx-get="/pages/about.html" hx-target="#content" hx-push-url="/" hx-indicator="#loader"
          class="nav-active">About</a></li>
      <li><a href="/notes" hx-get="/pages/notes.html" hx-target="#content" hx-push-url="/notes"
          hx-indicator="#loader">Notes</a></li>
    </ul>
  </nav>

  <main>
    <div id="content" hx-get="/pages/about.html" hx-trigger="load" hx-indicator="#loader">
    </div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Azlan Ali Khan. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear()

    // Keep nav active state in sync
    document.body.addEventListener('htmx:pushedIntoHistory', () => {
      const path = window.location.pathname
      document.querySelectorAll('.nav-links a').forEach(a => {
        a.classList.toggle('nav-active', a.getAttribute('hx-push-url') === path)
      })
    })
  </script>

</body>

</html>
